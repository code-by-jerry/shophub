<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.7/dist/tailwind.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@2.8.2/dist/alpine.js" defer></script>
  <script src="https://unpkg.com/@heroicons/vue@2.1.3/dist/umd/heroicons.min.js"></script>
  <title>My Website</title>
</head>
<body>
  <div class="announcement-bar" role="status" aria-live="polite">
    <div class="slider">
      <span id="announcement-offer" class="offer active">Fast. Fresh. Delivered.</span>
    </div>
  </div>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="nav-container">
      <!-- Logo -->
      <div class="nav-logo">
        <a href="#" class="logo-link">
          <svg class="logo-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
          </svg>
          <span class="logo-text">ShopHub</span>
        </a>
      </div>

      <!-- Desktop Navigation -->
      <div class="nav-menu">
        <a href="#" class="nav-link active">Home</a>
        <a href="#" class="nav-link">Shop</a>
        <div class="nav-dropdown">
          <a href="#" class="nav-link dropdown-toggle">Categories</a>
          <div class="dropdown-menu">
            <a href="#" class="dropdown-item">Electronics</a>
            <a href="#" class="dropdown-item">Clothing</a>
            <a href="#" class="dropdown-item">Home & Garden</a>
            <a href="#" class="dropdown-item">Sports</a>
            <a href="#" class="dropdown-item">Books</a>
          </div>
        </div>
        <a href="#" class="nav-link">About</a>
        <a href="#" class="nav-link">Contact</a>
      </div>

      <!-- Search Bar -->
      <div class="nav-search">
        <div class="search-container">
          <input type="text" class="search-input" placeholder="Search products...">
          <button class="search-btn">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
          </button>
        </div>
      </div>

      <!-- User Actions -->
      <div class="nav-actions">
        <button class="nav-action-btn" title="Account">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
          </svg>
        </button>
        <button class="nav-action-btn" title="Wishlist">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
          </svg>
        </button>
        <button class="nav-action-btn cart-btn" title="Shopping Cart">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4m0 0L7 13m0 0l-1.067 4.5M7 13l1.067 4.5M17 13l1.067 4.5M17 13l-1.067-4.5M7 13l1.067-4.5"></path>
          </svg>
          <span class="cart-count">0</span>
        </button>
      </div>

      <!-- Mobile Menu Toggle -->
      <button class="mobile-menu-toggle" id="mobile-menu-toggle">
        <svg class="hamburger-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>
    </div>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobile-menu">
      <div class="mobile-menu-content">
        <a href="#" class="mobile-nav-link active">Home</a>
        <a href="#" class="mobile-nav-link">Shop</a>
        <div class="mobile-dropdown">
          <button class="mobile-dropdown-toggle">Categories</button>
          <div class="mobile-dropdown-menu">
            <a href="#" class="mobile-dropdown-item">Electronics</a>
            <a href="#" class="mobile-dropdown-item">Clothing</a>
            <a href="#" class="mobile-dropdown-item">Home & Garden</a>
            <a href="#" class="mobile-dropdown-item">Sports</a>
            <a href="#" class="mobile-dropdown-item">Books</a>
          </div>
        </div>
        <a href="#" class="mobile-nav-link">About</a>
        <a href="#" class="mobile-nav-link">Contact</a>
        <div class="mobile-search">
          <input type="text" class="mobile-search-input" placeholder="Search products...">
          <button class="mobile-search-btn">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </nav>



  <script src="index.js" defer></script>
</body>
</html>
